<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Glaze · OKHST Playground</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1 class="app__title">
          Glaze <span class="app__dot">·</span> OKHST Playground
        </h1>
        <p class="app__subtitle">
          A contrast-uniform tone ramp from a single hue / saturation seed.
        </p>
      </header>

      <section class="controls" aria-label="Global controls">
        <div class="control">
          <label class="control__label" for="steps">
            <span>Steps</span>
            <output id="steps-value" class="control__value">11</output>
          </label>
          <input
            id="steps"
            class="slider"
            type="range"
            min="6"
            max="101"
            step="1"
            value="11"
          />
        </div>
        <div class="control" style="display: flex; align-items: flex-end; justify-content: flex-end;">
          <button type="button" id="add-palette-btn" class="btn">Add Palette</button>
        </div>
      </section>

      <div id="blocks-container"></div>

      <template id="block-template">
        <div class="block">
          <section class="controls" aria-label="Seed controls" style="margin-bottom: 16px;">
            <div class="control">
              <label class="control__label">
                <span>Hue</span>
                <output class="control__value hue-value">240°</output>
              </label>
              <input
                class="slider slider--hue hue-input"
                type="range"
                min="0"
                max="360"
                step="1"
                value="240"
              />
            </div>
            <div class="control">
              <label class="control__label">
                <span>Saturation</span>
                <output class="control__value saturation-value">80</output>
              </label>
              <input
                class="slider saturation-input"
                type="range"
                min="0"
                max="100"
                step="1"
                value="80"
              />
            </div>
            <div class="control" style="display: flex; align-items: flex-end; justify-content: flex-end;">
              <button type="button" class="btn btn--remove" aria-label="Remove palette">Remove Palette</button>
            </div>
          </section>
          <div class="palettes-container">
            <div class="palette" aria-label="Tone palette"></div>
          </div>
        </div>
      </template>

      <footer class="app__footer">
        Tone <strong>0</strong> → <strong>100</strong> across
        <strong id="footer-steps">11</strong> steps · click a swatch to copy its hex
      </footer>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
